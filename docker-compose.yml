version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: attendance_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  app:
    build: .
    container_name: attendance_app
    ports:
      - "8501:8501"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ADMIN_USER=admin
      - ADMIN_PASS=admin123
    volumes:
      - ./dataset:/app/dataset
      - ./embeddings:/app/embeddings
      - ./attendance_logs:/app/attendance_logs
      - ./snapshots:/app/snapshots
    depends_on:
      - redis
    restart: unless-stopped
    # Webcam passthrough (Linux host only)
    # devices:
    #   - /dev/video0:/dev/video0

volumes:
  redis_data:
